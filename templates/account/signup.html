{% extends 'base.html' %}
 
{% block content %}
<div>
    <h2>Create Account</h2>
    <form method="POST" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
          <small class="text-muted">
            Already have an account?
            <a href="{% url 'account_login' %}">Login</a>
          </small>
        
</div>

{% endblock %}
